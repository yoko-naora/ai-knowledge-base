<svg xmlns="http://www.w3.org/2000/svg" width="800" height="1000" viewBox="0 0 800 1000">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2c5f7a"/>
      <stop offset="50%" stop-color="#3a7a9b"/>
      <stop offset="100%" stop-color="#b8925a"/>
    </linearGradient>
    <linearGradient id="overlay" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(26,24,20,0)" />
      <stop offset="100%" stop-color="rgba(26,24,20,.35)" />
    </linearGradient>
  </defs>
  <rect width="800" height="1000" fill="url(#bg)"/>
  <rect width="800" height="1000" fill="url(#overlay)"/>
  <!-- abstract tech-knowledge motif -->
  <circle cx="400" cy="380" r="120" fill="none" stroke="rgba(255,255,255,.12)" stroke-width="1"/>
  <circle cx="400" cy="380" r="80" fill="none" stroke="rgba(255,255,255,.08)" stroke-width="1"/>
  <circle cx="400" cy="380" r="40" fill="none" stroke="rgba(255,255,255,.06)" stroke-width="1"/>
  <!-- dots representing knowledge nodes -->
  <circle cx="280" cy="280" r="3" fill="rgba(255,255,255,.3)"/>
  <circle cx="520" cy="250" r="2.5" fill="rgba(255,255,255,.25)"/>
  <circle cx="350" cy="220" r="2" fill="rgba(255,255,255,.2)"/>
  <circle cx="480" cy="320" r="3.5" fill="rgba(255,255,255,.28)"/>
  <circle cx="250" cy="350" r="2" fill="rgba(255,255,255,.2)"/>
  <circle cx="550" cy="380" r="2.5" fill="rgba(255,255,255,.22)"/>
  <circle cx="320" cy="420" r="3" fill="rgba(255,255,255,.25)"/>
  <circle cx="470" cy="450" r="2" fill="rgba(255,255,255,.18)"/>
  <circle cx="300" cy="500" r="2.5" fill="rgba(255,255,255,.2)"/>
  <circle cx="500" cy="520" r="3" fill="rgba(255,255,255,.22)"/>
  <!-- connecting lines -->
  <line x1="280" y1="280" x2="520" y2="250" stroke="rgba(255,255,255,.06)" stroke-width="1"/>
  <line x1="280" y1="280" x2="350" y2="220" stroke="rgba(255,255,255,.05)" stroke-width="1"/>
  <line x1="350" y1="220" x2="480" y2="320" stroke="rgba(255,255,255,.05)" stroke-width="1"/>
  <line x1="480" y1="320" x2="550" y2="380" stroke="rgba(255,255,255,.06)" stroke-width="1"/>
  <line x1="320" y1="420" x2="470" y2="450" stroke="rgba(255,255,255,.05)" stroke-width="1"/>
  <line x1="300" y1="500" x2="500" y2="520" stroke="rgba(255,255,255,.06)" stroke-width="1"/>
  <!-- center text -->
  <text x="400" y="650" text-anchor="middle" font-family="serif" font-size="28" font-weight="300" fill="rgba(255,255,255,.75)" letter-spacing=".15em">AI 知識庫</text>
  <text x="400" y="690" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="300" fill="rgba(255,255,255,.45)" letter-spacing=".25em">中日バイリンガル</text>
  <line x1="340" y1="710" x2="460" y2="710" stroke="rgba(255,255,255,.15)" stroke-width="1"/>
  <text x="400" y="750" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="300" fill="rgba(255,255,255,.3)" letter-spacing=".12em">写真を差し替えてください</text>
</svg>